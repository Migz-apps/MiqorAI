spring:
  application:
    name: medical-service
  datasource:
    url: jdbc:postgresql://localhost:5432/medipass
    username: medipass
    password: medipass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: medical_schema
    open-in-view: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8083

services:
  patient:
    url: http://localhost:8082

jwt:
  secret: medipass-dev-secret-key-change-in-production-min-32-chars
  access-expiration: 3600000
  refresh-expiration: 604800000

medipass:
  security:
    resource-server: true

cors:
  allowed-origins: "*"

rabbitmq:
  exchange: medipass.events
  routing-keys:
    visit-created: visit.created
    prescription-created: prescription.created
    test-created: test.created
    allergy-recorded: allergy.recorded

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
