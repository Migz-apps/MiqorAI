spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/medipass
    username: medipass
    password: medipass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: auth_schema
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8081

jwt:
  secret: medipass-dev-secret-key-change-in-production-min-32-chars
  access-expiration: 3600000
  refresh-expiration: 604800000

cors:
  allowed-origins: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
