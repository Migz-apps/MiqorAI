spring:
  datasource:
    url: jdbc:h2:mem:patient_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: patient_schema
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

jwt:
  secret: test-secret-key-minimum-32-characters-long
  access-expiration: 3600000
  refresh-expiration: 604800000

medipass:
  security:
    resource-server: true

cors:
  allowed-origins: "*"
