spring:
  application:
    name: patient-service
  datasource:
    url: jdbc:postgresql://localhost:5432/medipass
    username: medipass
    password: medipass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: patient_schema
    open-in-view: false

server:
  port: 8082

jwt:
  secret: medipass-dev-secret-key-change-in-production-min-32-chars
  access-expiration: 3600000
  refresh-expiration: 604800000

medipass:
  security:
    resource-server: true

cors:
  allowed-origins: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
