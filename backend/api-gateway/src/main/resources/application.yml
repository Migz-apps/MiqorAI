spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: patient-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/patients/**
        - id: medical-visits
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/visits/**
        - id: medical-prescriptions
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/prescriptions/**
        - id: medical-tests
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/tests/**
        - id: medical-diagnoses
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/diagnoses/**
        - id: medical-allergies
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/allergies/**
        - id: medical-doctors
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/doctors/**
        - id: medical-hospitals
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/hospitals/**
        - id: medical-history
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/history/**
        - id: audit-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/audit/**
        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/notifications/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
