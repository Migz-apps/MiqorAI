spring:
  application:
    name: audit-service
  datasource:
    url: jdbc:postgresql://localhost:5432/medipass
    username: medipass
    password: medipass
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: audit_schema
    open-in-view: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8084

jwt:
  secret: medipass-dev-secret-key-change-in-production-min-32-chars
  access-expiration: 3600000
  refresh-expiration: 604800000

medipass:
  security:
    resource-server: true

cors:
  allowed-origins: "*"

rabbitmq:
  exchange: medipass.events
  dead-letter-exchange: medipass.events.dlx
  dead-letter-queue: audit.dead-letter
  queue: notification.events
  queues:
    patient-events: audit.patient.events
    visit-events: audit.visit.events
    prescription-events: audit.prescription.events
    test-events: audit.test.events
    auth-events: audit.auth.events
    security-events: audit.security.events
    system-events: audit.system.events

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
