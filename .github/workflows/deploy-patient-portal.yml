name: Deploy Patient Portal

on:
  push:
    branches: [master, main]
    paths:
      - "patient-portal-desktop/**"
      - ".github/workflows/deploy-patient-portal.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-patient-portal
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: patient-portal-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: patient-portal-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE: /MiqorAI/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: patient-portal-desktop/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
