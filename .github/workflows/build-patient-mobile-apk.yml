name: Build Patient Mobile APK

on:
  push:
    branches: [master, main]
    paths:
      - "mobile_patient/**"
      - ".github/workflows/build-patient-mobile-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_patient

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile_patient/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Generate Android native project
        run: npx expo prebuild --platform android --non-interactive --no-install

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: mobile_patient/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: miqorai-patient-apk
          path: mobile_patient/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
